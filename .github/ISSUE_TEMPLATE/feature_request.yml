name: Feature request
description: Propose a product or engineering change.
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Explain consent, visibility, auth, audit, and revocation impact.
    validations:
      required: true
  - type: checkboxes
    id: prohibited
    attributes:
      label: Prohibited behavior check
      options:
        - label: This request does not require hidden sessions, stealth persistence, credential theft, keylogging, AV/EDR evasion, or Windows prompt bypass.
          required: true
