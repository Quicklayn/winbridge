name: Bug report
description: Report a reproducible defect.
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: Does this affect consent, visibility, auth, audit, revoke, capture, input, installer, or relay behavior?
    validations:
      required: true
